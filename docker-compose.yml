services:
  postgres:
    image: postgres:16-alpine
    container_name: gurukool-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: gurukool
      POSTGRES_USER: gurukool_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-gurukool_secure_2025}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gurukool_admin -d gurukool"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gurukool-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-gurukool_redis_2025} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "-a",
          "${REDIS_PASSWORD:-gurukool_redis_2025}",
          "ping",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: gurukool-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: gurukool_admin
      DB_PASSWORD: gurukool_secure_2025
      DB_NAME: gurukool
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: gurukool_redis_2025
    depends_on:
      - postgres
      - redis

  frontend:
    build: ./frontend
    container_name: gurukool-frontend
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
