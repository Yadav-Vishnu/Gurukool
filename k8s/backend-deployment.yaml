apiVersion: apps/v1
kind: Deployment
metadata:
  name: gurukool-backend
  namespace: gurukool
  labels:
    app: gurukool-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gurukool-backend
  template:
    metadata:
      labels:
        app: gurukool-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/gurukool/backend:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: gurukool-config
            - secretRef:
                name: gurukool-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 300m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: gurukool
spec:
  selector:
    app: gurukool-backend
  ports:
    - name: http
      port: 3000
      targetPort: 3000
