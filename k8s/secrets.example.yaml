apiVersion: v1
kind: Secret
metadata:
  name: gurukool-secrets
  namespace: gurukool
type: Opaque
stringData:
  DB_PASSWORD: replace-with-strong-postgres-password
  REDIS_PASSWORD: replace-with-strong-redis-password
  JWT_ACCESS_SECRET: replace-with-64-char-access-secret
  JWT_REFRESH_SECRET: replace-with-64-char-refresh-secret
  SESSION_SECRET: replace-with-64-char-session-secret
  GOOGLE_CLIENT_ID: replace-with-google-client-id
  GOOGLE_CLIENT_SECRET: replace-with-google-client-secret
